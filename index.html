<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portfolio-light.css">
</head>

<body>
  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <header class="site-header" id="site-header"></header>

  <main id="app-content"></main>

  <div class="modal" id="project-modal" aria-hidden="true">
    <div class="modal-overlay" data-close-modal></div>
    <section class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" type="button" aria-label="Close project details" data-close-modal>&times;</button>
      <div class="modal-body">
        <div class="modal-media">
          <button class="carousel-btn prev" type="button" aria-label="Previous media">&#10094;</button>
          <div class="carousel-track"></div>
          <button class="carousel-btn next" type="button" aria-label="Next media">&#10095;</button>
        </div>
        <div class="modal-copy">
          <h3 id="modal-title"></h3>
          <p class="modal-description"></p>
          <div class="modal-highlights-groups"></div>
          <div class="modal-block" style="margin-top: 2rem;">
            <h4 id="modal-stack-title"></h4>
            <div class="modal-stack" style="margin-top: 1rem;"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="portfolio-data.js"></script>
  <script src="portfolio-light.js"></script>
</body>

</html>
